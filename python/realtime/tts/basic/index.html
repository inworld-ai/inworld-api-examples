<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text-to-Speech</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #controls { padding: 16px; border-bottom: 1px solid #222; flex-shrink: 0; }
  textarea { width: 100%; height: 80px; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #111; color: #e0e0e0; font-family: inherit; font-size: 14px; resize: vertical; outline: none; transition: border-color .15s; }
  textarea:focus { border-color: #555; }
  #options { display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
  select, input[type="text"] { padding: 6px 10px; border: 1px solid #333; border-radius: 5px; background: #151515; color: #e0e0e0; font-size: 13px; outline: none; }
  select:focus, input:focus { border-color: #555; }
  #btn { padding: 8px 20px; border: 1px solid #444; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; cursor: pointer; transition: background .15s; margin-left: auto; }
  #btn:hover:not(:disabled) { background: #2a2a2a; }
  #btn:disabled { opacity: .4; cursor: default; }
  #btn.generating { border-color: #e8a45a; color: #e8a45a; }
  #panes { display: flex; flex: 1; overflow: hidden; }
  .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .pane + .pane { border-left: 1px solid #222; }
  .pane-header { padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #666; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
  .pane-body { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.6; }
  #status { display: flex; flex-direction: column; gap: 12px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; }
  .stat-label { color: #666; }
  .stat-value { color: #ccc; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  .stat-value.highlight { color: #7ecf8a; }
  #state-indicator { font-size: 14px; font-weight: 500; padding: 8px 0; }
  #state-indicator.ready { color: #666; }
  #state-indicator.generating { color: #e8a45a; }
  #state-indicator.playing { color: #7ecf8a; }
  #state-indicator.error { color: #c44; }
  .evt { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; line-height: 1.5; border-bottom: 1px solid #111; padding: 3px 0; }
  .evt-time { color: #444; margin-right: 6px; }
  .evt-type { color: #b8b; }
  .evt-detail { color: #666; margin-left: 4px; }
  @media (max-width: 640px) {
    #events-pane { display: none; }
    .pane + .pane { border-left: none; }
  }
</style>
</head>
<body>
  <div id="controls">
    <textarea id="text" placeholder="Enter text to synthesize…">Hello, world! What a wonderful day to be a text-to-speech model!</textarea>
    <div id="options">
      <label>Voice
        <input type="text" id="voice" value="Clive" style="width:100px" list="voice-list">
        <datalist id="voice-list">
          <option value="Clive">
          <option value="Dennis">
          <option value="Leah">
          <option value="Aura">
        </datalist>
      </label>
      <label>Model
        <select id="model">
          <option value="inworld-tts-1.5-mini">tts-1.5-mini</option>
          <option value="inworld-tts-1.5-max">tts-1.5-max</option>
          <option value="inworld-tts-1">tts-1</option>
          <option value="inworld-tts-1-max">tts-1-max</option>
        </select>
      </label>
      <label>Rate
        <select id="sampleRate">
          <option value="24000">24 kHz</option>
          <option value="22050">22.05 kHz</option>
          <option value="44100">44.1 kHz</option>
          <option value="48000">48 kHz</option>
        </select>
      </label>
      <button id="btn" onclick="generate()">Generate</button>
    </div>
  </div>
  <div id="panes">
    <div class="pane" id="status-pane">
      <div class="pane-header">Status</div>
      <div class="pane-body" id="status">
        <div id="state-indicator" class="ready">Ready</div>
        <div class="stat-row"><span class="stat-label">Time to first chunk</span><span class="stat-value" id="stat-ttfa">—</span></div>
        <div class="stat-row"><span class="stat-label">Total time</span><span class="stat-value" id="stat-total">—</span></div>
        <div class="stat-row"><span class="stat-label">Audio duration</span><span class="stat-value" id="stat-duration">—</span></div>
        <div class="stat-row"><span class="stat-label">Chunks received</span><span class="stat-value" id="stat-chunks">—</span></div>
        <div class="stat-row"><span class="stat-label">Characters</span><span class="stat-value" id="stat-chars">—</span></div>
      </div>
    </div>
    <div class="pane" id="events-pane">
      <div class="pane-header">Events</div>
      <div class="pane-body" id="events"></div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const eventsEl = document.getElementById('events');
    const stateEl = document.getElementById('state-indicator');
    let audioCtx, nextPlayTime = 0, activeSources = [], generating = false;
    let genStart, firstChunkTime;

    function setState(state, text) {
      stateEl.className = state;
      stateEl.textContent = text;
    }

    function setStat(id, value) {
      document.getElementById('stat-' + id).textContent = value;
    }

    function logEvent(text, detail) {
      const el = document.createElement('div');
      el.className = 'evt';
      const elapsed = ((Date.now() - genStart) / 1000).toFixed(2);
      el.innerHTML = `<span class="evt-time">${elapsed}s</span><span class="evt-type">${text}</span>${detail ? `<span class="evt-detail">${detail}</span>` : ''}`;
      eventsEl.appendChild(el);
      eventsEl.scrollTop = eventsEl.scrollHeight;
    }

    function flushAudio() {
      activeSources.forEach(s => { try { s.stop(); } catch {} });
      activeSources = [];
      nextPlayTime = 0;
    }

    async function queueAudioChunk(base64, sampleRate) {
      if (!audioCtx) {
        audioCtx = new AudioContext({ sampleRate });
        if (audioCtx.state === 'suspended') await audioCtx.resume();
      }

      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

      let audioBuffer;
      try {
        audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
      } catch {
        return 0;
      }

      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (nextPlayTime < now) nextPlayTime = now;
      src.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
      activeSources.push(src);
      src.onended = () => {
        const idx = activeSources.indexOf(src);
        if (idx !== -1) activeSources.splice(idx, 1);
      };
      return audioBuffer.duration;
    }

    /* Streaming JSON parser — handles both array-style and NDJSON */
    let parseBuffer = '';
    function extractObjects(text) {
      parseBuffer += text;
      const results = [];
      while (true) {
        parseBuffer = parseBuffer.replace(/^[\s,\[\]]+/, '');
        if (!parseBuffer.startsWith('{')) break;
        let depth = 0, i = 0, inStr = false, esc = false;
        for (; i < parseBuffer.length; i++) {
          if (esc) { esc = false; continue; }
          const c = parseBuffer[i];
          if (c === '\\' && inStr) { esc = true; continue; }
          if (c === '"') { inStr = !inStr; continue; }
          if (inStr) continue;
          if (c === '{') depth++;
          if (c === '}' && --depth === 0) { i++; break; }
        }
        if (depth !== 0) break;
        try { results.push(JSON.parse(parseBuffer.slice(0, i))); } catch {}
        parseBuffer = parseBuffer.slice(i);
      }
      return results;
    }

    async function generate() {
      if (generating) return;
      const text = document.getElementById('text').value.trim();
      if (!text) return;

      generating = true;
      btn.disabled = true;
      btn.className = 'generating';
      btn.textContent = 'Generating…';
      eventsEl.innerHTML = '';
      parseBuffer = '';
      flushAudio();
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      ['ttfa', 'total', 'duration', 'chunks', 'chars'].forEach(k => setStat(k, '—'));
      setState('generating', 'Generating…');

      const sampleRate = parseInt(document.getElementById('sampleRate').value);
      genStart = Date.now();
      firstChunkTime = null;
      let chunkCount = 0;
      let totalDuration = 0;
      let processedChars = 0;

      try {
        logEvent('request', `${text.length} chars`);

        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            voiceId: document.getElementById('voice').value,
            modelId: document.getElementById('model').value,
            sampleRateHertz: sampleRate,
          }),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`API ${res.status}: ${err.slice(0, 200)}`);
        }

        logEvent('response', `status ${res.status}`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          const objects = extractObjects(chunk);

          for (const obj of objects) {
            if (obj.error) {
              logEvent('error', obj.error.message || JSON.stringify(obj.error));
              continue;
            }
            const result = obj.result || obj;
            if (result.audioContent) {
              if (!firstChunkTime) {
                firstChunkTime = Date.now();
                const ttfa = firstChunkTime - genStart;
                setStat('ttfa', ttfa + 'ms');
                logEvent('first audio', `${ttfa}ms`);
                setState('playing', 'Playing…');
              }
              chunkCount++;
              const dur = await queueAudioChunk(result.audioContent, sampleRate);
              totalDuration += dur;
              const bytes = Math.ceil(result.audioContent.length * 3 / 4);
              logEvent(`chunk ${chunkCount}`, `${(bytes / 1024).toFixed(1)} KB, ${dur.toFixed(2)}s`);
              setStat('chunks', chunkCount);
              setStat('duration', totalDuration.toFixed(2) + 's');
            }
            if (result.usage?.processedCharactersCount) {
              processedChars = result.usage.processedCharactersCount;
              setStat('chars', processedChars);
            }
          }
        }

        const total = Date.now() - genStart;
        setStat('total', total + 'ms');
        logEvent('done', `${chunkCount} chunks, ${totalDuration.toFixed(2)}s audio`);
        if (chunkCount > 0) {
          setState('playing', `Playing (${totalDuration.toFixed(1)}s)…`);
          const remaining = (nextPlayTime - audioCtx.currentTime) * 1000;
          if (remaining > 0) setTimeout(() => setState('ready', 'Ready'), remaining + 100);
          else setState('ready', 'Ready');
        } else {
          setState('ready', 'Ready (no audio received)');
        }
      } catch (e) {
        console.error(e);
        logEvent('error', e.message);
        setState('error', 'Error: ' + e.message);
      } finally {
        generating = false;
        btn.disabled = false;
        btn.className = '';
        btn.textContent = 'Generate';
      }
    }
  </script>
</body>
</html>
